services:
  postgres:
    image: postgres:16-alpine
    container_name: nutricoach_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nutricoach_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nutricoach_password}
      POSTGRES_DB: ${POSTGRES_DB:-nutricoach}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nutricoach_network

  mongo:
    image: mongo:7-jammy
    container_name: nutricoach_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-nutricoach_ai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-nutricoach_ai_password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-nutricoach_ai}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - nutricoach_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nutricoach_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@nutricoach.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - nutricoach_network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  nutricoach_network:
    driver: bridge
