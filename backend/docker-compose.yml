version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       nutricoach_db
      POSTGRES_USER:     nutricoach_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nutricoach_password}
    ports:
      - "127.0.0.1:5432:5432"   # Solo localhost; no exponer a la red pública
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutricoach_user -d nutricoach_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT:              3000
      NODE_ENV:          production
      DB_HOST:           db
      DB_PORT:           5432
      DB_NAME:           nutricoach_db
      DB_USER:           nutricoach_user
      DB_PASSWORD:       ${DB_PASSWORD:-nutricoach_password}
      JWT_SECRET:        ${JWT_SECRET:?JWT_SECRET es obligatorio en producción}
      JWT_EXPIRES_IN:    ${JWT_EXPIRES_IN:-1h}
      BCRYPT_SALT_ROUNDS: 10
      ADMIN_EMAIL:       ${ADMIN_EMAIL:-}
      OFF_USER_AGENT:    "NutriCoach/1.0 (contacto@nutricoach.com)"
      THEMEALDB_API_KEY: "1"
      ALLOWED_ORIGINS:   ${ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@nutricoach.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD es obligatorio}
    ports:
      - "127.0.0.1:5050:80"    # Solo localhost; nunca exponer en producción
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
